<!DOCTYPE html>
<html>

<head>
    <title>AI Viral Clipper</title>

    <style>

        body{
            background:#111;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:100px;
        }

        input{
            width:60%;
            padding:15px;
            border:none;
            border-radius:10px;
            font-size:18px;
        }

        button{
            padding:15px 30px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#ff0000;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#cc0000;
        }

        h1{
            font-size:50px;
        }

        .message{
            margin-top:30px;
            font-size:22px;
            color:lightgreen;
        }

    </style>

</head>

<body>

    <h1>AI Viral Clipper</h1>

    <form method="POST">

        <input
            type="text"
            name="video_url"
            placeholder="Paste YouTube Video URL Here"
            required
        >

        <br>

        <button type="submit">
            Generate Viral Clips
        </button>

    </form>

    <div class="message">
        {{ message }}
    </div>

</body>

</html>
